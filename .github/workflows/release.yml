name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish D4Pressure.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -o publish

      - name: Zip release
        run: Compress-Archive -Path publish\* -DestinationPath D4Pressure-${{ github.ref_name }}.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: D4Pressure-${{ github.ref_name }}.zip
          generate_release_notes: true
